<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Dark green radial background -->
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="65%">
      <stop offset="0%"  stop-color="#0b5f56"/>
      <stop offset="60%" stop-color="#08433d"/>
      <stop offset="100%" stop-color="#053130"/>
    </radialGradient>

    <!-- Orange hexagon gradient -->
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#f4a261"/>
      <stop offset="55%" stop-color="#e0883a"/>
      <stop offset="100%" stop-color="#a85e1f"/>
    </linearGradient>

    <!-- Inner highlight stroke (lighter orange) -->
    <linearGradient id="hexStroke" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#ffd5a0"/>
      <stop offset="100%" stop-color="#f4a261"/>
    </linearGradient>

    <!-- Sheet (paper) gradient -->
    <linearGradient id="sheetGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#fbf6ec"/>
      <stop offset="100%" stop-color="#ece1cc"/>
    </linearGradient>

    <!-- Neon glow filter -->
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b1"/>
      <feGaussianBlur stdDeviation="14" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle drop-shadow for sheet -->
    <filter id="sheetShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle filling the icon -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>

  <!-- Subtle inner ring for depth -->
  <circle cx="256" cy="256" r="244" fill="none" stroke="#0b5f56" stroke-opacity="0.35" stroke-width="2"/>

  <!-- Neon halo behind hex -->
  <g filter="url(#neonGlow)" opacity="0.85">
    <polygon points="256,76 414,166 414,346 256,436 98,346 98,166"
             fill="none" stroke="#f4a261" stroke-width="6"/>
  </g>

  <!-- Outer hex aura -->
  <polygon points="256,70 418,164 418,348 256,442 94,348 94,164"
           fill="none" stroke="#f4a261" stroke-opacity="0.35" stroke-width="14"/>

  <!-- Main filled hexagon -->
  <polygon points="256,84 410,170 410,342 256,428 102,342 102,170"
           fill="url(#hexGrad)"
           stroke="url(#hexStroke)" stroke-width="4"
           stroke-linejoin="round"/>

  <!-- Inner hexagon highlight -->
  <polygon points="256,98 400,178 400,334 256,414 112,334 112,178"
           fill="none"
           stroke="#ffe1bd" stroke-opacity="0.55" stroke-width="2"
           stroke-linejoin="round"/>

  <!-- Document (sheet) inside hex -->
  <g filter="url(#sheetShadow)">
    <!-- Sheet body with folded corner (top-right) -->
    <path d="
      M 188 168
      L 296 168
      L 332 204
      L 332 348
      Q 332 360 320 360
      L 188 360
      Q 176 360 176 348
      L 176 180
      Q 176 168 188 168 Z"
      fill="url(#sheetGrad)"
      stroke="#a85e1f" stroke-width="2" stroke-opacity="0.35"/>
    <!-- Folded corner triangle -->
    <path d="M 296 168 L 296 204 L 332 204 Z"
          fill="#d9c8a8" stroke="#a85e1f" stroke-width="1.5" stroke-opacity="0.4"/>
    <path d="M 296 168 L 296 204 L 332 204 Z"
          fill="#000" fill-opacity="0.08"/>
  </g>

  <!-- Text lines inside sheet (stylized) -->
  <g fill="#a85e1f">
    <rect x="194" y="222" width="100" height="10" rx="5" opacity="0.85"/>
    <rect x="194" y="244" width="120" height="6"  rx="3" opacity="0.55"/>
    <rect x="194" y="262" width="108" height="6"  rx="3" opacity="0.55"/>
    <rect x="194" y="280" width="120" height="6"  rx="3" opacity="0.55"/>
    <rect x="194" y="298" width="86"  height="6"  rx="3" opacity="0.55"/>
    <!-- Total bar -->
    <rect x="194" y="324" width="120" height="18" rx="6" fill="#c77b2e" opacity="0.95"/>
    <rect x="200" y="328" width="42"  height="10" rx="3" fill="#fbf6ec" opacity="0.95"/>
  </g>
</svg>
